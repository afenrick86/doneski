<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chore Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <header>
      <h1>🧹 Chore Tracker 💰</h1>
      <p>Do yo job, make yo money! 🤑</p>
    </header>

    <!-- LOADING STATE: shown while Firestore data is being fetched -->
    <div id="loading-view">
      <div id="loading-spinner"></div>
      <p id="loading-text">Loading...</p>
    </div>

    <!-- HOME VIEW: shows all kids as cards -->
    <div id="home-view" class="hidden">
      <div id="kids-grid">
        <!-- Kid cards are generated by JavaScript -->
      </div>
      <div id="dashboard-btn-wrap">
        <button id="open-dashboard-btn">Parent Dashboard</button>
      </div>
    </div>

    <!-- DASHBOARD VIEW: group stats and per-kid earnings — hidden until opened -->
    <div id="dashboard-view" class="hidden">
      <button id="dashboard-back-btn">← Back</button>
      <section>
        <h2>Group Overview</h2>
        <div id="dashboard-widgets"></div>
      </section>
      <section>
        <h2>Earnings by Kid</h2>
        <div id="dashboard-table"></div>
      </section>
      <div id="settings-btn-wrap">
        <button id="open-settings-btn">Manage Kids</button>
      </div>
    </div>

    <!-- SETTINGS VIEW: add/edit/remove kids — hidden until opened -->
    <div id="settings-view" class="hidden">
      <button id="settings-back-btn">← Back</button>
      <section>
        <h2>Kids</h2>
        <div id="settings-kids-list"></div>
        <button id="add-kid-btn">+ Add Kid</button>
      </section>
      <section id="kid-form-section" class="hidden">
        <h2 id="kid-form-title">Add Kid</h2>
        <div class="form-field">
          <label for="form-name">Name</label>
          <input type="text" id="form-name" placeholder="First name" />
        </div>
        <div class="form-field">
          <label for="form-dob">Date of Birth</label>
          <input type="date" id="form-dob" />
        </div>
        <div class="form-field">
          <label for="form-chore">Chore</label>
          <input type="text" id="form-chore" placeholder="e.g. Clean Living Room" />
        </div>
        <div id="kid-form-buttons">
          <button id="save-kid-btn">Save</button>
          <button id="cancel-kid-btn">Cancel</button>
        </div>
      </section>
      <section>
        <h2>Pay Scale</h2>
        <p id="pay-scale-hint">Set the monthly allowance amount for each age range.</p>
        <div id="pay-scale-list"></div>
        <div id="pay-scale-buttons">
          <button id="save-pay-scale-btn">Save</button>
          <button id="cancel-pay-scale-btn">Cancel</button>
        </div>
      </section>

      
    </div>

    <!-- KID VIEW: individual tracker — hidden until a kid is selected -->
    <div id="kid-view" class="hidden">

      <button id="back-btn">← Back</button>

      <!-- Kid's name, age, and chore(s) — filled in by JavaScript -->
      <div id="kid-header"></div>

      <!-- Log a day's chore completion -->
      <section id="log-section">
        <h2>Log a Day</h2>
        <!-- Instruction shown before a day is selected -->
        <p id="log-prompt">Select a day on the calendar below.</p>
        <div id="log-controls" class="hidden">
          <p id="selected-date-label"></p>
          <div id="log-buttons">
            <button id="mark-complete">✓ Complete</button>
            <button id="mark-incomplete">✗ Incomplete</button>
          </div>
        </div>
      </section>

      <!-- List of this month's logged days -->
      <section id="month-log">
        <h2>This Month's Log</h2>
        <div id="log-ul"></div>
      </section>

      <!-- Progress stats and allowance info -->
      <section id="kid-progress">
        <h2>Progress &amp; Allowance</h2>
        <div id="progress-details"></div>
      </section>

    </div>

    <script type="module" src="script.js"></script>

  </body>
</html>
