<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chore Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <header>
      <h1>🧹 Chore Tracker 💰</h1>
      <p>Do yo job, make yo money! 🤑</p>
    </header>

    <!-- HOME VIEW: shows all kids as cards -->
    <div id="home-view">
      <div id="kids-grid">
        <!-- Kid cards are generated by JavaScript -->
      </div>
      <div id="dashboard-btn-wrap">
        <button id="open-dashboard-btn">Parent Dashboard</button>
      </div>
    </div>

    <!-- DASHBOARD VIEW: group stats and per-kid earnings — hidden until opened -->
    <div id="dashboard-view" class="hidden">
      <button id="dashboard-back-btn">← Back</button>
      <section>
        <h2>Group Overview</h2>
        <div id="dashboard-widgets"></div>
      </section>
      <section>
        <h2>Earnings by Kid</h2>
        <div id="dashboard-table"></div>
      </section>
    </div>

    <!-- KID VIEW: individual tracker — hidden until a kid is selected -->
    <div id="kid-view" class="hidden">

      <button id="back-btn">← Back</button>

      <!-- Kid's name, age, and chore(s) — filled in by JavaScript -->
      <div id="kid-header"></div>

      <!-- Log a day's chore completion -->
      <section id="log-section">
        <h2>Log a Day</h2>
        <!-- Instruction shown before a day is selected -->
        <p id="log-prompt">Select a day on the calendar below.</p>
        <div id="log-controls" class="hidden">
          <p id="selected-date-label"></p>
          <div id="log-buttons">
            <button id="mark-complete">✓ Complete</button>
            <button id="mark-incomplete">✗ Incomplete</button>
          </div>
        </div>
      </section>

      <!-- List of this month's logged days -->
      <section id="month-log">
        <h2>This Month's Log</h2>
        <div id="log-ul"></div>
      </section>

      <!-- Progress stats and allowance info -->
      <section id="kid-progress">
        <h2>Progress &amp; Allowance</h2>
        <div id="progress-details"></div>
      </section>

    </div>

    <script src="script.js"></script>

  </body>
</html>
